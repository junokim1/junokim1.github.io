career-profile:
  title: About Me
  summary: |
    I am a first-year Ph.D. student in Computer Science at the University of California, Berkeley,
    advised by Profs. Jason D. Lee and Song Mei. My interests lie in the <b>mathematical foundations of deep learning</b>,
    with a focus on nonconvex optimization, dynamical analysis, and computational-statistical guarantees for neural networks.
    I am also interested in understanding emergent capabilities of foundation models such as chain-of-thought reasoning.

    I will be interning at Google DeepMind during the summer of 2026, hosted by Hossein Mobahi.
    
    Previously, I received my B.Sc. in Mathematics and Statistics at Seoul National University as Valedictorian of '23,
    and my M.Sc. in Mathematical Informatics at the University of Tokyo advised by Prof. Taiji Suzuki,
    where I received the Dean's Award for outstanding research.

